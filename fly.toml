# fly.toml app configuration file generated for roof-measure-report on 2026-05-08T13:24:04Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'roof-measure-report'
primary_region = 'sjc'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '3030'

[http_service]
  internal_port = 3030
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
